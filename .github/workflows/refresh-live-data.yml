name: refresh live data

on:
  schedule:
    # 05:00 UTC every day (≈ midnight in Havana during standard time)
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data.json'
      - 'scripts/refresh-live-data.js'
      - '.github/workflows/refresh-live-data.yml'

concurrency:
  group: refresh-live-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh live.json
        run: node scripts/refresh-live-data.js

      - name: Commit live.json if changed
        run: |
          if [ -z "$(git status --porcelain live.json)" ]; then
            echo "live.json unchanged; nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live.json
          git commit -m "chore(live): refresh from apis"
          # Defensive pull in case a push raced us
          git pull --rebase origin main || true
          git push
