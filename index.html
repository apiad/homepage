<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>apiad.net — terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-screen-label="apiad · terminal">

  <!-- top chrome -->
  <div class="chrome">
    <div class="brand" id="brand-nav">
      <button class="brand-trigger" id="brand-trigger" aria-expanded="false" aria-controls="brand-links">
        <span class="dot"></span>
        <span class="brand-path"><span class="hidemobile">apiad.net — </span><span id="crumb" style="color:var(--fg)">~/</span></span>
        <span class="brand-caret">▸</span>
      </button>
      <span class="brand-links" id="brand-links" role="menu">
        <a href="#about"     data-nav="about">about</a>
        <a href="#now"       data-nav="now">now</a>
        <a href="#writing"   data-nav="writing">writing</a>
        <a href="#library"   data-nav="library">library</a>
        <a href="#research"  data-nav="research">research</a>
        <a href="#projects"  data-nav="projects">projects</a>
        <a href="#talks"     data-nav="talks">talks</a>
        <a href="#elsewhere" data-nav="elsewhere">elsewhere</a>
      </span>
    </div>
    <span class="tools">
      <button id="btn-replay" title="Replay boot sequence">↻ replay</button>
      <span class="sep"></span>
      <button id="btn-skip" title="Skip typing">» skip</button>
      <span class="sep"></span>
      <button id="btn-theme" class="theme-toggle" aria-label="Light mode">
        <span class="tt-track"><span class="tt-knob"></span></span>
        <span class="tt-label">dark</span>
        <span class="tt-bug">no! light attracts bugs</span>
      </button>
    </span>
  </div>

  <!-- scroll progress -->
  <div class="progress"><div class="bar" id="pbar"></div></div>

  <!-- main terminal -->
  <div class="wrap">
    <div class="term">
      <div class="term-bar">
        <span class="dots"><i></i><i></i><i></i></span>
        <span class="path">apiad@havana: ~</span>
        <span class="meta"><span id="localtime">—</span> · <b class="online-ind">● online</b></span>
      </div>

      <div class="term-body" id="body">
        <!-- sections are injected via JS (see BOOK below) to keep markup and animation in lockstep -->
      </div>
    </div>

  </div>

  <!-- Tweaks -->
  <div id="tweaks" aria-label="Tweaks">
    <h4>Tweaks</h4>
    <div class="tw-row"><span>Theme</span>
    <!-- light mode disabled, see above -->
    <span style="color:var(--muted);font-size:11px">dark only</span></div>
    <div class="tw-row" hidden><span>_legacy</span>
      <span class="seg" id="tw-theme">
        <button data-v="dark" class="on">dark</button>
        <button data-v="light">light</button>
      </span>
    </div>
    <div class="tw-row"><span>Typing</span>
      <span class="seg" id="tw-speed">
        <button data-v="slow">slow</button>
        <button data-v="normal" class="on">normal</button>
        <button data-v="fast">fast</button>
      </span>
    </div>
  </div>


<script src="script.js" defer></script>
</body>
</html>
